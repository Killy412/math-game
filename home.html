<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学小游戏合集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .game-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 16px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .game-card:nth-child(1) { border-color: #667eea; }
        .game-card:nth-child(1):hover { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .game-card:nth-child(1):hover * { color: white; }

        .game-card:nth-child(2) { border-color: #11998e; }
        .game-card:nth-child(2):hover { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .game-card:nth-child(2):hover * { color: white; }

        .game-card:nth-child(3) { border-color: #f093fb; }
        .game-card:nth-child(3):hover { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .game-card:nth-child(3):hover * { color: white; }

        .game-card:nth-child(4) { border-color: #4facfe; }
        .game-card:nth-child(4):hover { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .game-card:nth-child(4):hover * { color: white; }

        .game-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .game-card h2 {
            color: #333;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }

        .game-card p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .game-card .difficulty {
            display: inline-block;
            background: rgba(0, 0, 0, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 12px;
            color: #555;
        }

        .footer {
            color: #999;
            font-size: 0.85rem;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .games-grid {
                grid-template-columns: 1fr;
            }

            .game-card {
                padding: 20px;
            }

            .game-icon {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 数学小游戏合集</h1>
        <p class="subtitle">选择一个游戏开始挑战吧！</p>

        <div class="games-grid">
            <!-- 数独 -->
            <a href="index.html" class="game-card">
                <div class="game-icon">🧩</div>
                <h2>数独 Sudoku</h2>
                <p>经典 9×9 数独游戏<br>每行每列数字不重复</p>
                <span class="difficulty">简单 / 中等 / 困难</span>
            </a>

            <!-- 加减法练习 -->
            <a href="math.html" class="game-card">
                <div class="game-icon">➕</div>
                <h2>加减法练习</h2>
                <p>5×5 格子算式填空<br>适合儿童数学训练</p>
                <span class="difficulty">0-10 / 0-20 / 0-50</span>
            </a>

            <!-- KenKen -->
            <a href="kenken.html" class="game-card">
                <div class="game-icon">🔢</div>
                <h2>KenKen 肯肯数独</h2>
                <p>12×12 区域运算游戏<br>加减乘除全都有</p>
                <span class="difficulty">简单 / 中等 / 困难</span>
            </a>

            <!-- Crossmath -->
            <a href="crossmath.html" class="game-card">
                <div class="game-icon">✏️</div>
                <h2>Crossmath 数学填字</h2>
                <p>横向纵向算式交叉<br>填字游戏风格的数学谜题</p>
                <span class="difficulty">5×5 / 7×7 / 9×9</span>
            </a>
        </div>

        <div class="footer">
            <p>纯前端实现，无需安装 | 支持键盘操作 | <a href="#" onclick="showHelp(); return false;">操作说明</a></p>
        </div>
    </div>

    <script>
        function showHelp() {
            alert('🎮 操作说明：\n\n' +
                '🖱️ 鼠标操作：\n' +
                '• 点击格子选中\n' +
                '• 点击数字面板填入\n\n' +
                '⌨️ 键盘操作：\n' +
                '• 数字键 1-9：填入数字\n' +
                '• 方向键：移动选择\n' +
                '• 退格/删除键：清除\n\n' +
                '祝你游戏愉快！');
        }

        // 添加键盘快捷键
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key >= '1' && key <= '4') {
                const games = ['index.html', 'math.html', 'kenken.html', 'crossmath.html'];
                window.location.href = games[parseInt(key) - 1];
            }
        });
    </script>
</body>
</html>
