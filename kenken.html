<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KenKen 肯肯数独</title>
    <link rel="stylesheet" href="css/kenken.css">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <a href="index.html" class="back-btn">🏠 返回</a>
            <h1>KenKen 肯肯数独</h1>
        </div>

        <!-- 控制面板 -->
        <div class="controls">
            <div class="difficulty">
                <label>难度：</label>
                <button class="btn btn-difficulty active" data-difficulty="easy">简单</button>
                <button class="btn btn-difficulty" data-difficulty="medium">中等</button>
                <button class="btn btn-difficulty" data-difficulty="hard">困难</button>
            </div>
            <div class="actions">
                <button class="btn btn-primary" id="newGame">新游戏</button>
                <button class="btn btn-secondary" id="checkBtn">检查答案</button>
                <button class="btn btn-secondary" id="hintBtn">提示</button>
            </div>
        </div>

        <!-- 游戏信息 -->
        <div class="game-info">
            <span id="timer">时间: 00:00</span>
            <span id="progress">进度: 0/144</span>
            <span id="status"></span>
        </div>

        <!-- KenKen 网格 -->
        <div class="kenken-board" id="board">
            <!-- 12x12 网格将由 JavaScript 动态生成 -->
        </div>

        <!-- 数字选择面板 -->
        <div class="number-pad" id="numberPad">
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="num-btn" data-num="10">10</button>
            <button class="num-btn" data-num="11">11</button>
            <button class="num-btn" data-num="12">12</button>
            <button class="num-btn clear" data-num="0">清除</button>
        </div>

        <!-- 运算符说明 -->
        <div class="operators-info">
            <span class="op-info"><strong>+</strong> 加法</span>
            <span class="op-info"><strong>−</strong> 减法</span>
            <span class="op-info"><strong>×</strong> 乘法</span>
            <span class="op-info"><strong>÷</strong> 除法</span>
        </div>
    </div>

    <script src="js/kenken.js"></script>
</body>
</html>
